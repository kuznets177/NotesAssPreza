<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{{ note.title }}</title>
    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-tertiary: #21262d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --text-accent: #58a6ff;
            --border: #30363d;
            --code-bg: #0d1117;
            --code-border: #21262d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
            line-height: 1.6; background: var(--bg-primary); color: var(--text-primary);
        }
        .container { max-width: 980px; margin: 0 auto; padding: 24px; }
        .header { margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
        .header a { color: var(--text-accent); text-decoration: none; }
        .header a:hover { text-decoration: underline; }
        h1 { font-size: 2em; font-weight: 600; margin: 0 0 8px 0; color: var(--text-primary); }
        .date { color: var(--text-secondary); font-size: 0.9em; margin-bottom: 20px; }
        .content { background: var(--bg-secondary); padding: 24px; border-radius: 8px; border: 1px solid var(--border); }
        .markdown-body { color: var(--text-primary); }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: var(--text-primary); border-bottom: 1px solid var(--border); }
        .markdown-body h1 { font-size: 1.5em; margin: 24px 0 16px; }
        .markdown-body h2 { font-size: 1.3em; margin: 20px 0 12px; }
        .markdown-body h3 { font-size: 1.1em; margin: 16px 0 8px; }
        .markdown-body p { margin: 12px 0; }
        .markdown-body ul, .markdown-body ol { padding-left: 2em; margin: 12px 0; }
        .markdown-body strong { color: var(--text-primary); }
        .markdown-body blockquote { border-left: 4px solid var(--text-accent); padding-left: 16px; margin: 16px 0; background: var(--bg-tertiary); }
        .markdown-body code { background: var(--bg-tertiary); color: #f0f6fc; padding: .2em .4em; border-radius: 6px; font-size: 90%; font-family: 'Monaco','Menlo','Ubuntu Mono',monospace; }
        .markdown-body pre { background: var(--code-bg); border: 1px solid var(--code-border); padding: 16px; border-radius: 6px; overflow: auto; margin: 16px 0; }
        .markdown-body pre code { background: none; padding: 0; color: inherit; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 16px 0; }
        .markdown-body th, .markdown-body td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
        .markdown-body th { background: var(--bg-tertiary); }
        .delete-btn { background: none; border: none; color: #f85149; cursor: pointer; padding: 4px 8px; border-radius: 4px; }
        .delete-btn:hover { background: #f85149; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="{% url 'note_list' %}">← Заметки</a> |
            <a href="{% url 'note_edit' note.pk %}">✏️ Изменить</a> |
            <form method="post" action="{% url 'note_delete' note.pk %}" style="display: inline;">
                {% csrf_token %}
                <button type="submit" class="delete-btn"
                        onclick="return confirm('🚨 ТОЧНО удалить «{{ note.title|escape }}» навсегда?\n\nНельзя отменить!');">🗑️ Удалить</button>
            </form>
        </div>

        <div class="content">
            <h1>{{ note.title }}</h1>
            <p class="date">{{ note.created_at|date:"d.m.Y H:i" }}</p>
            <div class="markdown-body">
                {{ note.get_markdown_content|safe }}
            </div>
        </div>
    </div>
</body>
</html>
